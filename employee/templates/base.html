{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employees</title>
    <meta name="description" content="Employees">
    <meta charset="uft-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- date picker -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <!-- icons and font-awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
<!--header-->
{% block app_header %}
<header>
    <div class="header-container">
            <div class="nav-menu">
                <ul class="nav nav-pills">
                    <li class="nav-item">
                        <a class="navbar-brand" href="#">Employees</a>
                    </li>
                    <li class="nav-item">
                        <form class="form-inline my-2 my-lg-0">
                            <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                          </form>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Filter by
                          </a>
                          <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" href="#">Year</a>
                            <a class="dropdown-item" href="#">Skills</a>
                          </div>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasExample">
                            New Employee
                          </a>
                    </li>
                </ul>
            </div>
    </div>
</header>
{% endblock app_header %}
<!--end of header-->

<div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="offcanvasExampleLabel">Edit Employee</h5>
      <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">

      <div class="basic-info">
        <p>Basic Info</p>
        <div class="row name-row">
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name">
                </div>
            </div>
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name">
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Contact Number</label>
            <input type="text" class="form-control" id="first_name">
        </div>

        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="first_name">
        </div>

        <div class="calendar">
            <form>
                <div class="row form-group">
                    <label for="date" class="col-sm-1 col-form-label">Date</label>
                    <div class="col-sm-4">
                        <div class="input-group date" id="datepicker">
                            <input type="text" class="form-control">
                            <span class="input-group-append">
                                <span class="input-group-text bg-white d-block">
                                    <i class="fa fa-calendar"></i>
                                </span>
                            </span>
                        </div>
                    </div>
                </div>
            </form>
        </div>
      </div>

      <script type="text/javascript">
        $(function() {
            $('#datepicker').datepicker();
        });
      </script>

      <div class="address-info">
        <p>Address Info</p>
        <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Street Address</label>
            <input type="text" class="form-control" id="street_address">
        </div>

        <div class="row address-row">
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">City</label>
                    <input type="text" class="form-control" id="city">
                </div>
            </div>
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Postal code</label>
                    <input type="text" class="form-control" id="postal_code">
                </div>
            </div>
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Country</label>
                    <input type="text" class="form-control" id="country">
                </div>
            </div>
        </div>
      </div>

      <div class="skills">
        <p>Skills</p>
        <div class="row skills-row">
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Skill</label>
                    <input type="text" class="form-control" id="skill">
                </div>
            </div>
            <div class="col-sm">
                <div class="mb-3">
                    <label for="exampleFormControlInput1" class="form-label">Yrs Exp</label>
                    <input type="text" class="form-control" id="yrs_exp">
                </div>
            </div>
            <div class="col-sm">
                    <label for="exampleFormControlInput1" class="form-label">Seniority Rating</label>
                    <select class="form-select mb-3" id="seniority">
                        <option selected>Open this select menu</option>
                        <option value="1">Beginner</option>
                        <option value="2">Intermediate</option>
                        <option value="3">Expert</option>
                      </select>
            </div>
        </div>
      </div>

      <button class="btn btn-primary" type="submit">Button</button>
  </div>

</div>

<div id="content">
    {% block content %}

    {% endblock content %}
</div>

<script type="text/javascript">
    $(function() {
        $('#datepicker').datepicker();
    });
  </script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
</body>
